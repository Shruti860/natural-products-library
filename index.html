<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Natural Products Library</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f0f0f0;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    p.subtitle {
      text-align: center;
      color: #666;
      margin-top: -10px;
    }

    .search-area {
      text-align: center;
      margin: 20px 0;
    }

    .search-area input {
      padding: 8px;
      width: 300px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .sort-area {
      text-align: center;
      margin-bottom: 15px;
    }

    .sort-area label {
      font-size: 14px;
      margin-right: 5px;
    }

    .sort-area select {
      padding: 6px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th {
      background-color: #4CAF50;
      color: white;
      padding: 10px;
      text-align: left;
      font-size: 14px;
    }

    td {
      padding: 8px 10px;
      border-bottom: 1px solid #ddd;
      font-size: 13px;
    }

    tr:hover {
      background-color: #f9f9f9;
      cursor: pointer;
    }

    .count {
      text-align: center;
      margin-bottom: 8px;
      font-size: 13px;
      color: #555;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 999;
    }

    .modal {
      background: white;
      width: 600px;
      margin: 60px auto;
      border-radius: 6px;
      padding: 25px;
      position: relative;
    }

    .modal h2 {
      margin-top: 0;
      color: #333;
      font-size: 20px;
    }

    .modal table {
      width: 100%;
      margin-top: 10px;
    }

    .modal td {
      padding: 7px 10px;
      font-size: 13px;
      border-bottom: 1px solid #eee;
      vertical-align: top;
    }

    .modal td:first-child {
      font-weight: bold;
      color: #555;
      width: 40%;
    }

    .close-btn {
      position: absolute;
      top: 12px; right: 16px;
      font-size: 22px;
      cursor: pointer;
      color: #888;
    }

    .close-btn:hover {
      color: #333;
    }

    .na {
      color: #aaa;
    }

    .smiles-val {
      font-family: monospace;
      font-size: 11px;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <h1>Natural Products Library</h1>
  <p class="subtitle">SKJ Lab — 313 compounds | Click any row to see full details</p>

  <div class="search-area">
    <input type="text" id="searchBox" placeholder="Search compound name..." oninput="filterTable()">
  </div>

  <div class="sort-area">
    <label>Sort by:</label>
    <select onchange="sortTable(this.value)">
      <option value="name">Name (A-Z)</option>
      <option value="mw">Molecular Weight</option>
      <option value="logp">cLogP</option>
      <option value="dl">Druglikeness</option>
    </select>
  </div>

  <div class="count" id="count"></div>

  <table id="mainTable">
    <thead>
      <tr>
        <th>#</th>
        <th>Compound Name</th>
        <th>Mol. Weight (g/mol)</th>
        <th>cLogP</th>
        <th>cLogS</th>
        <th>H-Acceptors</th>
        <th>H-Donors</th>
        <th>Druglikeness</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" id="modal">
      <span class="close-btn" onclick="closeModalDirect()">&#10005;</span>
      <h2 id="modal-name"></h2>
      <table id="modal-table"></table>
    </div>
  </div>

let currentData = [...DATA];

function renderTable(data) {
  const tbody = document.getElementById('tableBody');
  document.getElementById('count').textContent = 'Showing ' + data.length + ' of ' + DATA.length + ' compounds';
  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#999;padding:20px">No results found</td></tr>';
    return;
  }
  tbody.innerHTML = data.map((c, i) => {
    const mw = c['Total Molweight'];
    return `<tr onclick="showDetail(${DATA.indexOf(c)})">
      <td>${i + 1}</td>
      <td>${c.Names.trim()}</td>
      <td>${mw !== null ? mw : '<span class="na">N/A</span>'}</td>
      <td>${c.cLogP !== null ? c.cLogP : '<span class="na">N/A</span>'}</td>
      <td>${c.cLogS !== null ? c.cLogS : '<span class="na">N/A</span>'}</td>
      <td>${c['H-Acceptors'] !== null ? c['H-Acceptors'] : '<span class="na">N/A</span>'}</td>
      <td>${c['H-Donors'] !== null ? c['H-Donors'] : '<span class="na">N/A</span>'}</td>
      <td>${c.Druglikeness !== null ? c.Druglikeness : '<span class="na">N/A</span>'}</td>
    </tr>`;
  }).join('');
}

function filterTable() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  currentData = DATA.filter(c => c.Names.toLowerCase().includes(q));
  renderTable(currentData);
}

function sortTable(by) {
  currentData.sort((a, b) => {
    if (by === 'name') return a.Names.trim().localeCompare(b.Names.trim());
    const key = by === 'mw' ? 'Total Molweight' : by === 'logp' ? 'cLogP' : 'Druglikeness';
    const av = a[key] ?? -Infinity;
    const bv = b[key] ?? -Infinity;
    return bv - av;
  });
  renderTable(currentData);
}

function showDetail(idx) {
  const c = DATA[idx];
  document.getElementById('modal-name').textContent = c.Names.trim();

  const rows = [
    ['Molecular Weight', c['Total Molweight'] !== null ? c['Total Molweight'] + ' g/mol' : 'N/A'],
    ['cLogP', c.cLogP !== null ? c.cLogP : 'N/A'],
    ['cLogS', c.cLogS !== null ? c.cLogS : 'N/A'],
    ['H-Acceptors', c['H-Acceptors'] !== null ? c['H-Acceptors'] : 'N/A'],
    ['H-Donors', c['H-Donors'] !== null ? c['H-Donors'] : 'N/A'],
    ['Total Surface Area', c['Total Surface Area'] !== null ? c['Total Surface Area'] + ' Å²' : 'N/A'],
    ['Druglikeness', c.Druglikeness !== null ? c.Druglikeness : 'N/A'],
    ['pKa', c.pka !== null ? c.pka : 'N/A'],
    ['InChI-Key', (c['InChI-Key'] && c['InChI-Key'] !== 'Unknown') ? c['InChI-Key'] : 'N/A'],
    ['SMILES', c.Smiles ? '<span class="smiles-val">' + c.Smiles.trim() + '</span>' : 'N/A'],
  ];

  document.getElementById('modal-table').innerHTML = rows.map(function(r) {
    return '<tr><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>';
  }).join('');

  document.getElementById('modalOverlay').style.display = 'block';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').style.display = 'none';
  }
}

function closeModalDirect() {
  document.getElementById('modalOverlay').style.display = 'none';
}

renderTable(DATA);
</script>
